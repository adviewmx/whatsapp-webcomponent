<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo · &lt;floating-whatsapp&gt;</title>

  <!-- Carga del Web Component. `defer` para no bloquear el render. -->
  <script src="floating-whatsapp.js" defer></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 40px;
      line-height: 1.6;
      color: #222;
    }
    h1 { color: #25D366; }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .spacer { height: 1200px; } /* para probar el position:fixed al hacer scroll */
  </style>
</head>
<body>
  <h1>Demo del componente &lt;floating-whatsapp&gt;</h1>
  <p>Desplázate: los botones permanecen fijos gracias a <code>position: fixed</code>.</p>

  <!-- 1) Uso básico: solo el teléfono. Toma todos los valores por defecto. -->
  <floating-whatsapp phone="523300000000"></floating-whatsapp>

  <!-- 2) Configuración completa, anclado a la derecha. -->
  <floating-whatsapp
    phone="523300000000"
    bg-color="#25D366"
    icon-color="#FFFFFF"
    bottom="20"
    right="20"
    size="60"
    event-name="click_whatsapp">
  </floating-whatsapp>

  <!-- 3) Segunda instancia anclada a la IZQUIERDA (left tiene prioridad sobre right). -->
  <floating-whatsapp
    phone="523300000000"
    bg-color="#128C7E"
    icon-color="#FFFFFF"
    bottom="100"
    left="20"
    size="50"
    event-name="click_whatsapp_left">
  </floating-whatsapp>

  <div class="spacer"></div>

  <!-- Ejemplo de cambio dinámico de atributos (reactivo vía attributeChangedCallback). -->
  <script>
    window.addEventListener('load', function () {
      var btns = document.querySelectorAll('floating-whatsapp');
      // Escucha el evento personalizado que emite el componente al hacer click.
      btns.forEach(function (el) {
        el.addEventListener('whatsapp:click', function (e) {
          console.log('Click en WhatsApp →', e.detail);
        });
      });

      // Demostración: a los 3s cambia el color de fondo del primer botón.
      // setTimeout(function () {
      //   btns[0].setAttribute('bg-color', '#075E54');
      // }, 3000);
    });
  </script>
</body>
</html>
